<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card p-4">
                <h3 class="mb-4"><i class="fas fa-plus-circle"></i> Add New Hotel</h3>

                <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
                <div id="successMsg" class="alert alert-success" style="display:none;"></div>

                <form id="addHotelForm">
                    <div class="mb-3">
                        <label class="form-label">Hotel Name</label>
                        <input type="text" class="form-control" id="name" placeholder="e.g. Taj Palace" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" id="city" placeholder="e.g. Mumbai" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Rating (1-5)</label>
                            <input type="number" class="form-control" id="rating" min="1" max="5" step="0.1" placeholder="4.5" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" id="address" placeholder="Full address" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="description" rows="3" placeholder="Describe the hotel..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Hotel
                    </button>
                    <a href="/hotels" class="btn btn-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');

    if (!token || role !== 'ROLE_ADMIN') {
        window.location.href = '/login';
    }

    document.getElementById('addHotelForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const body = {
            name: document.getElementById('name').value,
            city: document.getElementById('city').value,
            address: document.getElementById('address').value,
            description: document.getElementById('description').value,
            rating: parseFloat(document.getElementById('rating').value)
        };

        try {
            const response = await fetch('/api/hotels', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(body)
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById('successMsg').textContent = 'Hotel added successfully!';
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
                setTimeout(() => window.location.href = '/hotels', 1500);
            } else {
                document.getElementById('errorMsg').textContent = data.message || 'Failed to add hotel';
                document.getElementById('errorMsg').style.display = 'block';
            }
        } catch (error) {
            document.getElementById('errorMsg').textContent = 'Connection error.';
            document.getElementById('errorMsg').style.display = 'block';
        }
    });
</script>
</body>
</html>
