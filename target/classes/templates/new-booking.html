<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="mb-4"><i class="fas fa-calendar-plus"></i> Confirm Booking</h3>

                <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
                <div id="successMsg" class="alert alert-success" style="display:none;"></div>

                <form id="bookingForm">
                    <div class="mb-3">
                        <label class="form-label">Hotel ID</label>
                        <input type="text" class="form-control" id="hotelId" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Room ID</label>
                        <input type="text" class="form-control" id="roomId" readonly>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Check-in Date</label>
                            <input type="date" class="form-control" id="checkInDate" readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Check-out Date</label>
                            <input type="date" class="form-control" id="checkOutDate" readonly>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-check-circle"></i> Confirm Booking
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    // Get params from URL
    const params = new URLSearchParams(window.location.search);
    document.getElementById('hotelId').value = params.get('hotelId') || '';
    document.getElementById('roomId').value = params.get('roomId') || '';
    document.getElementById('checkInDate').value = params.get('checkIn') || '';
    document.getElementById('checkOutDate').value = params.get('checkOut') || '';

    document.getElementById('bookingForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const body = {
            hotelId: document.getElementById('hotelId').value,
            roomId: document.getElementById('roomId').value,
            checkInDate: document.getElementById('checkInDate').value,
            checkOutDate: document.getElementById('checkOutDate').value
        };

        try {
            const response = await fetch('/api/bookings', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(body)
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById('successMsg').innerHTML = 
                    `Booking confirmed! <br>Booking ID: <strong>${data.id}</strong><br>
                    <a href="/payments/new?bookingId=${data.id}" class="btn btn-success mt-2">Proceed to Payment</a>`;
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
            } else {
                document.getElementById('errorMsg').textContent = data.message || 'Booking failed';
                document.getElementById('errorMsg').style.display = 'block';
            }
        } catch (error) {
            document.getElementById('errorMsg').textContent = 'Connection error.';
            document.getElementById('errorMsg').style.display = 'block';
        }
    });
</script>
</body>
</html>
