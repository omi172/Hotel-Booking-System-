
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotels - Hotel Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
        }

        .navbar-custom {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            padding: 15px 30px;
        }

        .navbar-custom .navbar-brand { color: white; font-size: 22px; font-weight: 700; }
        .navbar-custom .nav-link { color: rgba(255,255,255,0.85); font-weight: 500; margin: 0 8px; }
        .navbar-custom .nav-link:hover, .navbar-custom .nav-link.active { color: #fff; }

        .page-header {
            padding: 30px 0 20px;
        }

        .page-header h2 {
            font-weight: 700;
            color: #1a237e;
            border-left: 4px solid #1a237e;
            padding-left: 15px;
        }

        .form-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .form-card h4 { color: #1a237e; font-weight: 600; margin-bottom: 20px; }
        .form-label { font-weight: 600; color: #444; }
        .form-control, .form-select { border-radius: 8px; padding: 10px 15px; border: 2px solid #e0e0e0; }
        .form-control:focus, .form-select:focus { border-color: #1a237e; box-shadow: none; }

        .btn-primary-custom {
            background: linear-gradient(135deg, #1a237e, #283593);
            border: none; padding: 12px 30px; border-radius: 8px;
            font-weight: 600; color: white;
        }

        .btn-primary-custom:hover { opacity: 0.9; color: white; }

        .table-custom thead { background: #e8eaf6; color: #1a237e; }
        .table-custom thead th { font-weight: 600; text-transform: uppercase; font-size: 13px; padding: 14px 15px; }
        .table-custom tbody td { padding: 12px 15px; vertical-align: middle; }

        .hotel-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            border-left: 4px solid #1a237e;
        }

        .admin-badge {
            background: #ffebee;
            color: #c62828;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="fas fa-hotel"></i> Hotel Booking System</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/hotels}">Hotels</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/search}">Search</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/bookings}">Bookings</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/payments}">Payments</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i></a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <!-- Page Header -->
    <div class="page-header">
        <h2><i class="fas fa-building"></i> Hotel Module</h2>
        <p class="text-muted">Admins can create, update, view, and delete hotel records. Users can only view.</p>
    </div>

    <div class="row g-4">
        <!-- Add/Edit Hotel Form (Admin Only) -->
        <div class="col-md-5" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
            <div class="form-card">
                <h4><i class="fas fa-plus-circle"></i> Add New Hotel <span class="admin-badge">ADMIN ONLY</span></h4>
                <form th:action="@{/api/hotels}" method="post" th:object="${hotel}">
                    <div class="mb-3">
                        <label class="form-label">Hotel Name</label>
                        <input type="text" class="form-control" th:field="*{name}" placeholder="Enter hotel name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" th:field="*{city}" placeholder="Enter city" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" th:field="*{address}" placeholder="Enter full address" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Describe the hotel"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rating</label>
                        <select class="form-select" th:field="*{rating}">
                            <option value="1">⭐ 1 Star</option>
                            <option value="2">⭐⭐ 2 Stars</option>
                            <option value="3">⭐⭐⭐ 3 Stars</option>
                            <option value="4">⭐⭐⭐⭐ 4 Stars</option>
                            <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100">
                        <i class="fas fa-save"></i> Save Hotel
                    </button>
                </form>
            </div>
        </div>

        <!-- Hotel List -->
        <div th:class="${#authorization.expression('hasRole(''ADMIN'')') ? 'col-md-7' : 'col-md-12'}">
            <div class="form-card">
                <h4><i class="fas fa-list"></i> All Hotels</h4>
                <div class="table-responsive">
                    <table class="table table-custom">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>City</th>
                            <th>Address</th>
                            <th>Rating</th>
                            <th th:if="${#authorization.expression('hasRole(''ADMIN'')')}">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="hotel, iter : ${hotels}">
                            <td th:text="${iter.index + 1}">1</td>
                            <td th:text="${hotel.name}">Hotel Name</td>
                            <td th:text="${hotel.city}">City</td>
                            <td th:text="${hotel.address}">Address</td>
                            <td th:text="${hotel.rating} + ' ⭐'">4 ⭐</td>
                            <td th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                                <a th:href="@{/hotels/edit/{id}(id=${hotel.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/hotels/delete/{id}(id=${hotel.id})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Are you sure you want to delete this hotel?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
