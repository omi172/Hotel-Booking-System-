<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="mb-4"><i class="fas fa-credit-card"></i> Make Payment</h3>

                <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
                <div id="successMsg" class="alert alert-success" style="display:none;"></div>

                <form id="paymentForm">
                    <div class="mb-3">
                        <label class="form-label">Booking ID</label>
                        <input type="text" class="form-control" id="bookingId" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount (₹)</label>
                        <input type="number" class="form-control" id="amount" placeholder="Enter amount" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Payment Method</label>
                        <select class="form-select" id="paymentMethod" required>
                            <option value="">Select payment method</option>
                            <option value="CREDIT_CARD">Credit Card</option>
                            <option value="DEBIT_CARD">Debit Card</option>
                            <option value="UPI">UPI</option>
                            <option value="NET_BANKING">Net Banking</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-lock"></i> Pay Now
                    </button>
                </form>

                <div id="paymentResult" class="mt-4" style="display:none;">
                    <hr>
                    <h5>Payment Receipt</h5>
                    <div id="receiptContent"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    const params = new URLSearchParams(window.location.search);
    document.getElementById('bookingId').value = params.get('bookingId') || '';

    document.getElementById('paymentForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const body = {
            bookingId: document.getElementById('bookingId').value,
            amount: parseFloat(document.getElementById('amount').value),
            paymentMethod: document.getElementById('paymentMethod').value
        };

        try {
            const response = await fetch('/api/payments', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(body)
            });

            const data = await response.json();

            if (response.ok) {
                if (data.paymentStatus === 'SUCCESS') {
                    document.getElementById('successMsg').textContent = data.message;
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('errorMsg').style.display = 'none';
                } else {
                    document.getElementById('errorMsg').innerHTML = 
                        `${data.message} <button class="btn btn-sm btn-warning ms-2" onclick="retryPayment('${data.id}')">Retry</button>`;
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('successMsg').style.display = 'none';
                }

                // Show receipt
                document.getElementById('paymentResult').style.display = 'block';
                document.getElementById('receiptContent').innerHTML = `
                    <table class="table table-sm">
                        <tr><td><strong>Transaction ID:</strong></td><td>${data.transactionId}</td></tr>
                        <tr><td><strong>Amount:</strong></td><td>₹${data.amount}</td></tr>
                        <tr><td><strong>Method:</strong></td><td>${data.paymentMethod}</td></tr>
                        <tr><td><strong>Status:</strong></td><td>
                            <span class="badge ${data.paymentStatus === 'SUCCESS' ? 'bg-success' : 'bg-danger'}">
                                ${data.paymentStatus}
                            </span>
                        </td></tr>
                        <tr><td><strong>Date:</strong></td><td>${new Date(data.createdAt).toLocaleString()}</td></tr>
                    </table>`;
            } else {
                document.getElementById('errorMsg').textContent = data.message || 'Payment failed';
                document.getElementById('errorMsg').style.display = 'block';
            }
        } catch (error) {
            document.getElementById('errorMsg').textContent = 'Connection error.';
            document.getElementById('errorMsg').style.display = 'block';
        }
    });

    async function retryPayment(paymentId) {
        try {
            const response = await fetch('/api/payments/' + paymentId + '/retry', {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            const data = await response.json();
            if (data.paymentStatus === 'SUCCESS') {
                document.getElementById('successMsg').textContent = 'Retry successful! Payment completed.';
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
            } else {
                document.getElementById('errorMsg').textContent = 'Retry failed. Please try again.';
            }
        } catch (error) {
            alert('Error retrying payment.');
        }
    }
</script>
</body>
</html>
